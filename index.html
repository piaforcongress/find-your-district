<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #1B3A6B 0%, #4D3561 40%, #8D273B 75%, #A6232E 100%);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #FFFFFF;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    background: rgba(22,52,102,0.5);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .logo {
    width: 34px; height: 34px; border-radius: 9px;
    background: #163466;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .header-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .container { max-width: 520px; margin: 0 auto; padding: 32px 20px 60px; }

  /* Result */
  .result { text-align: center; margin-bottom: 32px; opacity: 0; transform: translateY(16px); transition: all 0.5s cubic-bezier(0.16,1,0.3,1); }
  .result.visible { opacity: 1; transform: translateY(0); }
  .result-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); margin-bottom: 14px; }
  .result-number { font-size: 112px; font-weight: 800; line-height: 1; letter-spacing: -0.05em; color: #FFFFFF; text-shadow: 0 4px 30px rgba(0,0,0,0.3); }
  .result-address { font-size: 14px; color: rgba(255,255,255,0.6); margin-top: 14px; line-height: 1.5; max-width: 380px; margin-left: auto; margin-right: auto; }
  .map-btn {
    margin-top: 24px; padding: 13px 28px; font-size: 14px; font-weight: 600;
    border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.15); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: #fff; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
    transition: filter 0.2s;
  }
  .map-btn:hover { filter: brightness(1.15); }

  /* Warning */
  .warning {
    margin-top: 18px; padding: 12px 18px; border-radius: 10px;
    background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.25);
    font-size: 13px; color: #FCD34D; line-height: 1.5; text-align: left;
    max-width: 400px; margin-left: auto; margin-right: auto;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .warning-icon { font-size: 16px; line-height: 1; flex-shrink: 0; margin-top: 1px; }

  /* Intro */
  .intro h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; line-height: 1.2; text-shadow: 0 2px 12px rgba(0,0,0,0.2); }
  .intro p { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.5; }

  /* Search card */
  .search-card {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px; padding: 18px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .search-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.45); margin-bottom: 8px; }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1; padding: 13px 16px; font-size: 14px; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.2);
    color: #fff; outline: none; font-family: inherit;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.3); }
  .search-input:focus { border-color: rgba(255,255,255,0.35); }
  .search-btn {
    padding: 13px 20px; font-size: 14px; font-weight: 600; border-radius: 10px;
    border: none; background: linear-gradient(135deg, #A6232E, #8D273B);
    color: #fff; cursor: pointer; box-shadow: 0 2px 12px rgba(166,35,46,0.35);
    display: flex; align-items: center; gap: 7px; white-space: nowrap;
    font-family: inherit; transition: filter 0.2s;
  }
  .search-btn:hover { filter: brightness(1.12); }
  .search-btn:disabled { background: rgba(166,35,46,0.4); box-shadow: none; cursor: wait; }
  .search-hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; }

  /* Error */
  .error-msg {
    margin-top: 16px; padding: 14px 18px; border-radius: 10px;
    background: rgba(0,0,0,0.25); border: 1px solid rgba(239,68,68,0.3);
    font-size: 13px; color: #FCA5A5; line-height: 1.5;
  }

  .footer { text-align: center; font-size: 11px; color: rgba(255,255,255,0.18); margin-top: 32px; line-height: 1.6; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.25); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .result-number { font-size: 80px; }
    .search-row { flex-direction: column; }
    .search-btn { justify-content: center; }
  }
</style>

<div class="header">
  <div class="logo">FL</div>
  <span class="header-title">FL Congressional District Finder</span>
</div>

<div class="container">
  <!-- Result (hidden until search) -->
  <div id="result" class="result" style="display:none;">

      View Full District Map
    </button>
  </div>

  <!-- Search -->
  <div id="introBlock" class="intro" style="margin-bottom:24px;">
    <h1>Find Your District</h1>
    <p>Enter a Florida street address below.</p>
  </div>

  <div class="search-card">
    <label id="searchLabel" class="search-label">Address</label>
    <div class="search-row">
      <input type="text" id="addressInput" class="search-input" placeholder="e.g. 12855 NW 8th St, Sunrise, FL 33323" autocomplete="street-address">
      <button id="searchBtn" class="search-btn" onclick="handleLookup()">Search</button>
    </div>
    <div id="searchHint" class="search-hint">A full street address ensures the most accurate result.</div>
  </div>

  <div id="errorBox" class="error-msg" style="display:none;"></div>

  <div class="footer">EOGPCRP2026 &middot; FL Legislature Special Session 2026-D &middot; Signed into law May 4, 2026</div>
</div>

// Point-in-polygon (ray casting)
function pip(pt, ring) {
  const [px, py] = pt;
  let ins = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    if ((yi > py) !== (yj > py) && px < ((xj - xi) * (py - yi)) / (yj - yi) + xi) ins = !ins;
  }
  return ins;
}

function findDistrict(lng, lat) {
  for (const f of DISTRICTS.features) {
    const g = f.geometry;
    const rings = g.type === "MultiPolygon" ? g.coordinates.flatMap(p => p) : g.coordinates;
    for (const r of rings) { if (pip([lng, lat], r)) return f.properties.d; }
  }
  return null;
}

function checkNearBoundary(lng, lat, district) {
  const nearby = new Set();
  const d = 0.004;
  const offsets = [[d,0],[-d,0],[0,d],[0,-d],[d,d],[-d,-d],[d,-d],[-d,d]];
  for (const [dx, dy] of offsets) {
    const other = findDistrict(lng + dx, lat + dy);
    if (other && other !== district) nearby.add(other);
  }
  return [...nearby];
}

function isZipOnly(addr) {
  const t = addr.trim();
  if (/^\d{5}(-\d{4})?$/.test(t)) return true;
  const noZip = t.replace(/\d{5}(-\d{4})?/, '').replace(/,/g, '').trim();
  return !/\d/.test(noZip) && noZip.split(/\s+/).filter(Boolean).length <= 4;
}

// Geocoding — try ArcGIS first, fall back to Nominatim
async function geocode(address) {
  const full = /florida|,\s*fl\b/i.test(address) ? address : address + ", Florida";
  // ArcGIS World Geocoder
  try {
    const url = "https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates"
      + "?SingleLine=" + encodeURIComponent(full)
      + "&f=json&outFields=Match_addr&maxLocations=1&sourceCountry=USA&category=Address";
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.candidates && data.candidates.length > 0) {
        const c = data.candidates[0];
        return { lat: c.location.y, lng: c.location.x, display: c.attributes?.Match_addr || c.address || address };
      }
    }
  } catch (_) {}
  // Fallback: Nominatim
  try {
    const url = "https://nominatim.openstreetmap.org/search?q=" + encodeURIComponent(full)
      + "&format=json&limit=1&countrycodes=us";
    const resp = await fetch(url);
    if (resp.ok) {
      const data = await resp.json();
      if (data.length > 0) {
        const fl = data.find(d => d.display_name?.toLowerCase().includes("florida")) || data[0];
        return { lat: parseFloat(fl.lat), lng: parseFloat(fl.lon), display: fl.display_name };
      }
    }
  } catch (_) {}
  throw new Error("Address not found. Please check the address and try again.");
}

let currentResult = null;

function openMap() {
  if (!currentResult) return;
  const url = "https://www.arcgis.com/apps/mapviewer/index.html?webmap=" + WEBMAP_ID
    + "&center=" + currentResult.lng + "," + currentResult.lat + "&level=14";
  window.open(url, "_blank");
}

async function handleLookup() {
  const input = document.getElementById("addressInput");
  const address = input.value.trim();
  if (!address) return;

  if (isZipOnly(address)) {
    showError("Please include a street address, not just a city or ZIP. Some areas span multiple districts, so a full address is needed for accuracy.");
    return;
  }

  setLoading(true);
  hideError();
  hideResult();

  try {
    const geo = await geocode(address);
    const district = findDistrict(geo.lng, geo.lat);
    if (!district) throw new Error("This location doesn\u2019t fall within a Florida congressional district. Verify the address is in Florida.");

    const nearby = checkNearBoundary(geo.lng, geo.lat, district);
    currentResult = { district, lat: geo.lat, lng: geo.lng, matchedAddress: geo.display || address };

    showResult(district, geo.display || address, nearby);
    input.value = "";
    input.placeholder = "Enter an address to search again";
    document.getElementById("introBlock").style.display = "none";
    document.getElementById("searchLabel").style.display = "none";
    document.getElementById("searchHint").style.display = "none";
  } catch (e) {
    showError(e.message || "Something went wrong. Please try again.");
  } finally {
    setLoading(false);
  }
}

function showResult(district, address, nearby) {
  document.getElementById("districtNumber").textContent = district;
  document.getElementById("matchedAddress").textContent = address;
  const el = document.getElementById("result");
  el.style.display = "block";

  if (nearby && nearby.length > 0) {
    const others = nearby.map(d => "District " + d).join(" and ");
    document.getElementById("warningText").textContent =
      "This address is near the boundary of " + others + ". We recommend verifying on the full district map.";
    document.getElementById("warningBox").style.display = "flex";
  } else {
    document.getElementById("warningBox").style.display = "none";
  }

  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add("visible"); }); });
}

function hideResult() {
  const el = document.getElementById("result");
  el.classList.remove("visible");
  el.style.display = "none";
  currentResult = null;
}

function showError(msg) {
  const el = document.getElementById("errorBox");
  el.textContent = msg;
  el.style.display = "block";
}

function hideError() {
  document.getElementById("errorBox").style.display = "none";
}

function setLoading(on) {
  const btn = document.getElementById("searchBtn");
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span> Looking up\u2026'
    : 'Search';
}

// Enter key support
document.getElementById("addressInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") handleLookup();
});
</script>
</body>
</html>
